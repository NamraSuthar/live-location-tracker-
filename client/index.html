<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackKar</title>
    <link rel="stylesheet" href="style.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="header-left">
                    <img src="logo/TrackKar logo.png" alt="TrackKar Logo" class="header-logo">
                    <h1>TrackKar</h1>
                </div>
                <div class="status-indicator">
                    <span id="connection-status" class="status-dot disconnected"></span>
                    <span id="connection-text">Disconnected</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Map Container -->
            <div id="map" class="map-container"></div>

            <!-- Control Panel -->
            <div class="control-panel">
                <div class="control-section">
                    <h2>Settings</h2>
                    <div class="control-group">
                        <button id="start-tracking-btn" class="btn btn-primary">
                            Start Tracking
                        </button>
                        <button id="stop-tracking-btn" class="btn btn-secondary" disabled>
                            Stop Tracking
                        </button>
                    </div>
                </div>

                <div class="control-section">
                    <h2>Active Users</h2>
                    <div id="users-list" class="users-list">
                        <p class="empty-state">No users connected</p>
                    </div>
                </div>

                <div class="control-section">
                    <h2>Statistics</h2>
                    <div class="stats">
                        <div class="stat-item">
                            <span class="stat-label">Total Users:</span>
                            <span id="total-users" class="stat-value">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Last Update:</span>
                            <span id="last-update" class="stat-value">-</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Notification Toast -->
    <div id="notification" class="notification hidden"></div>

    <!-- Leaflet JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <!-- Socket.IO Client -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <!-- App JS -->
    <script src="app.js"></script>
</body>

</html>
