<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackKar - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f4f4f5 0%, #fafafa 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            border-color: 5px solid #000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            height: 60px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 28px;
            color: #000;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .login-button {
            width: 100%;
            padding: 12px 20px;
            margin-top: 30px;
            background: linear-gradient(135deg, #0d0d0e 0%, #0c0c0c 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .divider {
            text-align: center;
            color: #999;
            margin: 20px 0;
            font-size: 12px;
        }

        .info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
            margin-top: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <img src="logo/TrackKar logo.png" alt="TrackKar" class="logo" style="max-height: 60px;">
            <h1>TrackKar</h1>
            <p class="subtitle">Real-time Location Tracking</p>
        </div>

        <p style="color: #666; margin: 20px 0; text-align: center;">Sign in to share and track locations with others</p>

        <button class="login-button" onclick="loginWithDwaar()">
            Sign In with Dwaar
        </button>

        <div class="info">
            <strong>🔒 Secure Login</strong><br>
            Powered by your Dwaar OIDC server
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        const DWAAR_CONFIG = {
            dwaarUrl: "https://dwaar-okjc.onrender.com",
            clientId: "c1e631353cf23a4bbca6e371f14babe1"
        };

        function loginWithDwaar() {
            const redirectUri = window.location.origin + '/login.html';
            const authUrl = `${DWAAR_CONFIG.dwaarUrl}/o/authenticate?` +
                `client_id=${encodeURIComponent(DWAAR_CONFIG.clientId)}&` +
                `redirect_uri=${encodeURIComponent(redirectUri)}&` +
                `response_type=code&` +
                `scope=openid profile email`;

            window.location.href = authUrl;
        }

      
    </script>
</body>
</html>
